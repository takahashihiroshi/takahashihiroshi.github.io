<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ site.title }}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,300;0,400;0,500;0,600;1,400&family=Noto+Sans+JP:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary:      #1a2f4e;
      --accent:       #2563eb;
      --accent-light: #dbeafe;
      --bg:           #ffffff;
      --text:         #1e293b;
      --text-muted:   #64748b;
      --border:       #e2e8f0;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', 'Noto Sans JP', system-ui, sans-serif;
      color: var(--text);
      background: var(--bg);
      line-height: 1.7;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Header ── */
    .site-header {
      background: var(--primary);
      color: white;
      padding: 3.5rem 2rem 3rem;
    }
    .header-inner { max-width: 860px; margin: 0 auto; }
    .site-header .name {
      font-size: 2.25rem;
      font-weight: 300;
      letter-spacing: 0.06em;
      margin-bottom: 0.5rem;
    }
    .site-header .affil {
      font-size: 0.9rem;
      font-weight: 400;
      opacity: 0.65;
      letter-spacing: 0.03em;
    }

    /* gradient accent bar under header */
    .header-bar {
      height: 4px;
      background: linear-gradient(90deg, #2563eb, #60a5fa, #93c5fd);
    }

    /* ── Main ── */
    .site-main {
      max-width: 860px;
      margin: 0 auto;
      padding: 3rem 2rem 5rem;
    }

    /* h1 = "Publications" */
    .site-main > h1 {
      font-size: 1.5rem;
      font-weight: 600;
      color: var(--primary);
      padding-bottom: 0.6rem;
      border-bottom: 2px solid var(--accent);
      margin-bottom: 2rem;
    }

    /* h2 = "International Conference", "Preprints", etc. */
    .site-main h2 {
      font-size: 0.7rem;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.15em;
      margin-top: 2.75rem;
      margin-bottom: 1.25rem;
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }
    .site-main h2::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    /* ── Ordered list (publications) ── */
    ol {
      list-style: none;
      counter-reset: pub;
    }
    ol > li {
      counter-increment: pub;
      display: grid;
      grid-template-columns: 1.75rem 1fr;
      column-gap: 1rem;
      padding-bottom: 1.25rem;
      margin-bottom: 1.25rem;
      border-bottom: 1px solid var(--border);
      font-size: 0.875rem;
      line-height: 1.75;
    }
    ol > li:last-child { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }
    ol > li::before {
      content: counter(pub);
      font-size: 0.7rem;
      font-weight: 600;
      color: var(--text-muted);
      padding-top: 0.2rem;
      text-align: right;
    }

    /* ── Unordered list (thesis) ── */
    ul { list-style: none; }
    ul > li {
      font-size: 0.875rem;
      line-height: 1.75;
      padding-bottom: 1rem;
    }

    /* ── Bold = author names & paper titles ── */
    strong { color: var(--primary); font-weight: 600; }

    /* ── Links ([paper], [arXiv], etc.) ── */
    a {
      display: inline-block;
      color: var(--accent);
      background: var(--accent-light);
      padding: 0.1em 0.45em;
      border-radius: 3px;
      font-size: 0.75rem;
      font-weight: 500;
      text-decoration: none;
      margin: 0.1rem 0.05rem;
      transition: background 0.15s ease, color 0.15s ease;
    }
    a:hover {
      background: var(--accent);
      color: #fff;
    }

    /* ── Footer ── */
    .site-footer {
      border-top: 1px solid var(--border);
      padding: 1.5rem 2rem;
      text-align: center;
      font-size: 0.78rem;
      color: var(--text-muted);
    }

    /* ── Responsive ── */
    @media (max-width: 640px) {
      .site-header { padding: 2.5rem 1.25rem 2rem; }
      .site-header .name { font-size: 1.75rem; }
      .site-main { padding: 2rem 1.25rem 4rem; }
    }
  </style>
</head>
<body>
  <header class="site-header">
    <div class="header-inner">
      <div class="name">{{ site.title }}</div>
      <div class="affil">{{ site.description }}</div>
    </div>
  </header>
  <div class="header-bar"></div>
  <main class="site-main">
    {{ content }}
  </main>
  <footer class="site-footer">
    {{ site.title }}
  </footer>
</body>
</html>
